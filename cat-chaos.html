<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cat Chaos</title>
<style>
    body {
        font-family: 'Verdana', sans-serif;
        background: #fffbe6;
        color: #333;
        text-align: center;
        padding: 50px;
    }
    h1 {
        color: #ff4e50;
        cursor: pointer;
        transition: transform 0.3s;
    }
    h1:hover {
        transform: scale(1.2) rotate(5deg);
    }
    button {
        background: #ffcc00;
        border: none;
        padding: 10px 20px;
        font-size: 1em;
        cursor: pointer;
        margin: 10px;
        border-radius: 8px;
        transition: transform 0.2s;
    }
    button:hover {
        transform: scale(1.1);
    }
    #catResponse {
        margin-top: 30px;
        font-size: 1.2em;
        font-weight: bold;
    }
</style>
</head>
<body>
<h1>🐱 Cat Chaos! 🐱</h1>
<p>Click a button and see what Cat does!</p>

<button onclick="catSpeaks('food')">Give Cat Food</button>
<button onclick="catSpeaks('sock')">Give Cat Sock</button>
<button onclick="catSpeaks('moon')">Teleport to Moon</button>
<button onclick="catSpeaks('mona')">Show Mona Lisa</button>

<div id="catResponse">Cat is watching you…</div>

<script>
function catSpeaks(action) {
    const responses = {
        food: [
            "Cat: yEss!! *inhales food like a vacuum* 😻",
            "Cat: mmm yummy! gvgvHFutrdgcghwgfi76tRDYThg!!!!!!!!!11"
        ],
        sock: [
            "Cat: yummm…sock? 🧦",
            "Cat: *explodes into socks* POOF! Now we have socks everywhere!"
        ],
        moon: [
            "Cat: wait! don't leave me! 🌙",
            "Cat: *teleports with you* poof! Moon chaos engaged!"
        ],
        mona: [
            "Cat: what is this?? ohhh… it's mid… RUN FOR YOUR LIFE!",
            "Cat: EATS PAINTING HAAAAAAAAAALLLLLLLMMM!"
        ]
    };

    const chosen = responses[action][Math.floor(Math.random() * responses[action].length)];
    document.getElementById('catResponse').textContent = chosen;
}
</script>
</body>
</html>
